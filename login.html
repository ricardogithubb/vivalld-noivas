<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vivalld - Login</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="./assets/css/styles.css">
</head>
<body>
    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay d-none">
        <div class="spinner-border text-light" role="status">
            <span class="visually-hidden">Carregando...</span>
        </div>
    </div>

    <!-- Header com nome do aplicativo -->
    <header class="header fixed-top">
        <div class="container-fluid">
            <div class="row align-items-center">
                <div class="col-12 text-center">
                    <i class="bi bi-music-note-beamed" style="font-size: 3rem; color: var(--primary-color);"></i>
                    <h2 class="mt-0">Vivalld</h2>
                    <p class="header-subtitle">Sua jornada musical começa aqui</p>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="login-container">
            <div class="login-card fade-in">
                <h2 class="login-title text-center">Bem-vinda de volta</h2>
                <p class="login-subtitle text-center">Faça login para continuar</p>
                
                <form id="loginForm">
                    <div class="mb-3">
                        <label for="email" class="form-label">E-mail</label>
                        <input type="email" class="form-control" id="email" 
                               placeholder="seu@email.com" required>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">Senha</label>
                        <input type="password" class="form-control" id="password" 
                               placeholder="********" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 next-btn">
                        Entrar
                    </button>
                </form>
                
                <p class="text-center text-muted small mt-4">
                    Use qualquer e-mail/senha para teste
                </p>
            </div>
        </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/db.js"></script>
    <script src="/assets/js/auth.js"></script>
    <script src="/assets/js/utils.js"></script>
    <script>
        $(document).ready(async () => {
            await DB.init();
            await Auth.init();
            
            // Se já estiver logado, redireciona
            if (Auth.currentUser) {
                const nextScreen = await Auth.getNextScreen();
                window.location.href = `${nextScreen}.html`;
            }

            $('#loginForm').on('submit', async (e) => {
                e.preventDefault();
                
                $('#loadingOverlay').removeClass('d-none');
                
                const email = $('#email').val();
                const password = $('#password').val();
                
                try {
                    await Auth.login(email, password);
                    const nextScreen = await Auth.getNextScreen();
                    window.location.href = `${nextScreen}.html`;
                } catch (error) {
                    alert(error.message);
                    $('#loadingOverlay').addClass('d-none');
                }
            });
        });
    </script>
</body>
</html>
