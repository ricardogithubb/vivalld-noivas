<div class="card animate__animated animate__fadeIn mt-3">
    <div class="card-header">
        <h3 class="mb-0"><i class="bi bi-music-note-beamed me-2"></i>Selecione seu Repertório</h3>
    </div>
    <div class="card-body">
        <div class="progress mb-4" style="height: 20px;">
            <div class="progress-bar" role="progressbar" style="width: {{progresso}}%;" id="progressoRepertorio">
                {{progresso}}%
            </div>
        </div>
        
        <div class="alert alert-custom mb-4">
            <i class="bi bi-info-circle"></i>
            <strong>Instruções:</strong> Selecione até 2 músicas para cada categoria. Você pode ouvir um preview clicando no botão play <i class="bi bi-play-circle"></i>. Suas escolhas serão salvas automaticamente.
        </div>
        
        <div id="repertorioSecoes">
            <!-- As seções serão carregadas dinamicamente via JavaScript -->
        </div>
    </div>
</div>
