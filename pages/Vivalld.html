<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BridalApp - Planejamento Musical para Casamentos</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Google Fonts - Fontes elegantes -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    
    <style>
        :root {
            --primary-color: #d4af37;
            --secondary-color: #8b6b4d;
            --dark-color: #2c2c2c;
            --light-color: #f9f5f0;
            --success-color: #28a745;
            --danger-color: #dc3545;
            --warning-color: #ffc107;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: var(--dark-color);
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
        }

        .app-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            margin-bottom: 20px;
            animation: fadeInUp 0.5s ease;
        }

        .card-header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border-radius: 15px 15px 0 0 !important;
            padding: 20px;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(212, 175, 55, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .form-check-input:checked {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
        }

        .music-card {
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .music-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            border-color: var(--primary-color);
        }

        .music-card.selected {
            border: 2px solid var(--primary-color);
            background-color: rgba(212, 175, 55, 0.05);
        }

        .music-card.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        .play-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary-color);
            color: white;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .play-btn:hover {
            transform: scale(1.1);
            background: var(--secondary-color);
        }

        .section-title {
            color: var(--primary-color);
            margin: 30px 0 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--primary-color);
        }

        .nav-tabs {
            border-bottom: 2px solid #e0e0e0;
        }

        .nav-tabs .nav-link {
            color: var(--dark-color);
            font-weight: 500;
            border: none;
            padding: 10px 20px;
        }

        .nav-tabs .nav-link.active {
            color: var(--primary-color);
            border-bottom: 2px solid var(--primary-color);
            background: transparent;
        }

        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .login-card {
            max-width: 400px;
            width: 100%;
            padding: 40px;
        }

        .status-badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .status-paid {
            background-color: #d4edda;
            color: #155724;
        }

        .status-pending {
            background-color: #fff3cd;
            color: #856404;
        }

        .status-overdue {
            background-color: #f8d7da;
            color: #721c24;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .repertoire-item {
            padding: 10px;
            border-bottom: 1px solid #e0e0e0;
        }

        .repertoire-item:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>
    <div class="app-container" id="app">
        <!-- Tela de Login -->
        <div id="loginScreen" class="login-container">
            <div class="card login-card animate__animated animate__fadeIn">
                <div class="text-center mb-4">
                    <i class="bi bi-gem" style="font-size: 3rem; color: var(--primary-color);"></i>
                    <h2 class="mt-3">BridalApp</h2>
                    <p class="text-muted">Planejamento Musical para Casamentos</p>
                </div>
                <form id="loginForm">
                    <div class="mb-3">
                        <label for="email" class="form-label">E-mail</label>
                        <input type="email" class="form-control" id="email" required value="noiva@teste.com">
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Senha</label>
                        <input type="password" class="form-control" id="password" required value="123456">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Entrar</button>
                </form>
                <div class="text-center mt-3">
                    <small class="text-muted">Use: noiva@teste.com / 123456</small>
                </div>
            </div>
        </div>

        <!-- Tela Principal (após login) -->
        <div id="mainScreen" style="display: none;">
            <!-- Navbar -->
            <nav class="navbar navbar-expand-lg navbar-light bg-white rounded-3 shadow-sm mb-4">
                <div class="container-fluid">
                    <a class="navbar-brand" href="#">
                        <i class="bi bi-gem" style="color: var(--primary-color);"></i>
                        BridalApp
                    </a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="navbarNav">
                        <ul class="navbar-nav ms-auto">
                            <li class="nav-item">
                                <a class="nav-link" href="#" onclick="showSection('instrucoes')">Instruções</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="#" onclick="showSection('repertorio')">Repertório</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="#" onclick="showSection('contrato')">Contrato</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="#" onclick="showSection('boletos')">Boletos</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="#" onclick="showSection('repertorioFinal')">Meu Repertório</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link text-danger" href="#" onclick="logout()">Sair</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>

            <!-- Conteúdo Principal -->
            <div id="contentArea">
                <!-- As seções serão carregadas aqui dinamicamente -->
            </div>
        </div>
    </div>

    <!-- Audio Player (oculto) -->
    <audio id="audioPlayer" style="display: none;"></audio>

    <!-- Bootstrap JS e dependências -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <script>
        // Banco de dados IndexedDB
        const dbName = 'BridalAppDB';
        const dbVersion = 1;
        let db;

        // Dados de exemplo
        const musicas = {
            entradaNoivo: [
                { id: 1, nome: "Perfect - Ed Sheeran", artista: "Ed Sheeran", url: "musica1.mp3" },
                { id: 2, nome: "Marry Me - Train", artista: "Train", url: "musica2.mp3" },
                { id: 3, nome: "All of Me - John Legend", artista: "John Legend", url: "musica3.mp3" },
                { id: 4, nome: "Thinking Out Loud - Ed Sheeran", artista: "Ed Sheeran", url: "musica4.mp3" },
                { id: 5, nome: "A Thousand Years - Christina Perri", artista: "Christina Perri", url: "musica5.mp3" },
                { id: 6, nome: "Can't Help Falling in Love - Elvis Presley", artista: "Elvis Presley", url: "musica6.mp3" },
                { id: 7, nome: "Make You Feel My Love - Adele", artista: "Adele", url: "musica7.mp3" },
                { id: 8, nome: "Lover - Taylor Swift", artista: "Taylor Swift", url: "musica8.mp3" },
                { id: 9, nome: "Just the Way You Are - Bruno Mars", artista: "Bruno Mars", url: "musica9.mp3" },
                { id: 10, nome: "I Don't Want to Miss a Thing - Aerosmith", artista: "Aerosmith", url: "musica10.mp3" }
            ],
            entradaDamas: [
                { id: 11, nome: "Halo - Beyoncé", artista: "Beyoncé", url: "musica11.mp3" },
                { id: 12, nome: "Beautiful - Christina Aguilera", artista: "Christina Aguilera", url: "musica12.mp3" },
                // ... adicionar mais músicas
            ],
            entradaNoiva: [
                { id: 21, nome: "Marcha Nupcial - Mendelssohn", artista: "Mendelssohn", url: "musica21.mp3" },
                { id: 22, nome: "Ave Maria - Schubert", artista: "Schubert", url: "musica22.mp3" },
                // ... adicionar mais músicas
            ],
            salmo: [
                { id: 31, nome: "Salmo 22 - O Senhor é meu pastor", artista: "Litúrgico", url: "musica31.mp3" },
                { id: 32, nome: "Salmo 103 - Bendize ó minha alma", artista: "Litúrgico", url: "musica32.mp3" },
                // ... adicionar mais músicas
            ],
            aclamacao: [
                { id: 41, nome: "Aleluia - Handel", artista: "Handel", url: "musica41.mp3" },
                { id: 42, nome: "Santo - Litúrgico", artista: "Litúrgico", url: "musica42.mp3" },
                // ... adicionar mais músicas
            ],
            comunhao: [
                { id: 51, nome: "Pão da Vida - Padre Zezinho", artista: "Padre Zezinho", url: "musica51.mp3" },
                { id: 52, nome: "Tudo é do Pai - Padre Fábio de Melo", artista: "Padre Fábio de Melo", url: "musica52.mp3" },
                // ... adicionar mais músicas
            ],
            assinatura: [
                { id: 61, nome: "Instrumental Clássico 1", artista: "Vários", url: "musica61.mp3" },
                { id: 62, nome: "Instrumental Clássico 2", artista: "Vários", url: "musica62.mp3" },
                // ... adicionar mais músicas
            ],
            saida: [
                { id: 71, nome: "Marcha Nupcial - Wagner", artista: "Wagner", url: "musica71.mp3" },
                { id: 72, nome: "Hallelujah - Jeff Buckley", artista: "Jeff Buckley", url: "musica72.mp3" },
                // ... adicionar mais músicas
            ]
        };

        // Estado do usuário
        let userState = {
            loggedIn: false,
            instrucoesLidas: false,
            orientacoesLidas: false,
            selecoes: {
                entradaNoivo: [],
                entradaDamas: [],
                entradaNoiva: [],
                salmo: [],
                aclamacao: [],
                comunhao: [],
                assinatura: [],
                saida: []
            }
        };

        // Inicializar IndexedDB
        function initDB() {
            const request = indexedDB.open(dbName, dbVersion);

            request.onerror = function(event) {
                console.error("Erro ao abrir IndexedDB:", event.target.error);
            };

            request.onsuccess = function(event) {
                db = event.target.result;
                console.log("IndexedDB aberto com sucesso");
                loadUserState();
            };

            request.onupgradeneeded = function(event) {
                const db = event.target.result;
                
                // Criar object stores
                if (!db.objectStoreNames.contains('userState')) {
                    db.createObjectStore('userState', { keyPath: 'id' });
                }
                
                if (!db.objectStoreNames.contains('musicas')) {
                    const musicasStore = db.createObjectStore('musicas', { keyPath: 'id', autoIncrement: true });
                    musicasStore.createIndex('categoria', 'categoria', { unique: false });
                }
                
                if (!db.objectStoreNames.contains('boletos')) {
                    const boletosStore = db.createObjectStore('boletos', { keyPath: 'id', autoIncrement: true });
                    boletosStore.createIndex('status', 'status', { unique: false });
                }
            };
        }

        // Salvar estado do usuário
        function saveUserState() {
            if (!db) return;
            
            const transaction = db.transaction(['userState'], 'readwrite');
            const store = transaction.objectStore('userState');
            store.put({ id: 1, ...userState });
        }

        // Carregar estado do usuário
        function loadUserState() {
            if (!db) return;
            
            const transaction = db.transaction(['userState'], 'readonly');
            const store = transaction.objectStore('userState');
            const request = store.get(1);
            
            request.onsuccess = function(event) {
                if (request.result) {
                    userState = { ...userState, ...request.result };
                }
            };
        }

        // Login
        $('#loginForm').on('submit', function(e) {
            e.preventDefault();
            const email = $('#email').val();
            const password = $('#password').val();
            
            // Simulação de login (em produção, validar com backend)
            if (email === 'noiva@teste.com' && password === '123456') {
                userState.loggedIn = true;
                $('#loginScreen').hide();
                $('#mainScreen').show();
                showSection('instrucoes');
                saveUserState();
            } else {
                alert('Credenciais inválidas!');
            }
        });

        // Logout
        function logout() {
            userState.loggedIn = false;
            $('#mainScreen').hide();
            $('#loginScreen').show();
            $('#loginForm')[0].reset();
        }

        // Mostrar seção específica
        function showSection(section) {
            let content = '';
            
            switch(section) {
                case 'instrucoes':
                    content = gerarInstrucoes();
                    break;
                case 'repertorio':
                    content = gerarRepertorio();
                    break;
                case 'contrato':
                    content = gerarContrato();
                    break;
                case 'boletos':
                    content = gerarBoletos();
                    break;
                case 'repertorioFinal':
                    content = gerarRepertorioFinal();
                    break;
            }
            
            $('#contentArea').html(content);
        }

        // Gerar tela de instruções
        function gerarInstrucoes() {
            return `
                <div class="card animate__animated animate__fadeIn">
                    <div class="card-header">
                        <h3 class="mb-0"><i class="bi bi-info-circle me-2"></i>Instruções</h3>
                    </div>
                    <div class="card-body">
                        <div class="instrucoes-texto" style="max-height: 500px; overflow-y: auto; padding: 20px; background: #f8f9fa; border-radius: 10px;">
                            <h4>Bem-vinda ao BridalApp!</h4>
                            <p>Este aplicativo foi desenvolvido para ajudar no planejamento musical do seu casamento.</p>
                            <h5 class="mt-4">Como funciona:</h5>
                            <ol>
                                <li>Leia atentamente todas as instruções</li>
                                <li>Marque a opção "Li e concordo com as instruções" ao final</li>
                                <li>Clique em Próximo para continuar</li>
                                <li>Na próxima tela, leia as orientações específicas</li>
                                <li>Após ler, marque a opção e clique em Próximo</li>
                                <li>Escolha até 2 músicas para cada momento da cerimônia</li>
                                <li>Você pode ouvir um trecho de cada música antes de escolher</li>
                                <li>Ao final, confira seu repertório completo</li>
                            </ol>
                            <h5 class="mt-4">Importante:</h5>
                            <ul>
                                <li>Selecione apenas 2 músicas por categoria</li>
                                <li>As músicas devem ser apropriadas para um casamento</li>
                                <li>Em caso de dúvidas, entre em contato conosco</li>
                            </ul>
                        </div>
                        
                        <div class="form-check mt-4">
                            <input class="form-check-input" type="checkbox" id="concordoInstrucoes" ${userState.instrucoesLidas ? 'checked' : ''}>
                            <label class="form-check-label" for="concordoInstrucoes">
                                Li e concordo com as instruções
                            </label>
                        </div>
                        
                        <button class="btn btn-primary mt-3" id="btnProximoInstrucoes" ${!userState.instrucoesLidas ? 'disabled' : ''} onclick="proximoInstrucoes()">
                            Próximo <i class="bi bi-arrow-right ms-2"></i>
                        </button>
                    </div>
                </div>
            `;
        }

        // Gerar tela de orientações
        function gerarOrientacoes() {
            return `
                <div class="card animate__animated animate__fadeIn">
                    <div class="card-header">
                        <h3 class="mb-0"><i class="bi bi-journal-text me-2"></i>Orientações</h3>
                    </div>
                    <div class="card-body">
                        <div class="orientacoes-texto" style="max-height: 500px; overflow-y: auto; padding: 20px; background: #f8f9fa; border-radius: 10px;">
                            <h4>Orientações para escolha das músicas</h4>
                            
                            <h5 class="mt-4">Entrada do Noivo:</h5>
                            <p>Músicas que transmitam segurança e emoção. Geralmente instrumentais ou com letras suaves.</p>
                            
                            <h5>Entrada das Damas:</h5>
                            <p>Músicas alegres e elegantes, que combinem com a entrada das madrinhas.</p>
                            
                            <h5>Entrada da Noiva:</h5>
                            <p>O momento mais esperado! Escolha uma música que represente esse momento único.</p>
                            
                            <h5>Salmo:</h5>
                            <p>Para cerimônias religiosas, escolha um salmo que tenha significado para o casal.</p>
                            
                            <h5>Aclamação:</h5>
                            <p>Momento de louvor e alegria. Músicas com ritmo mais animado.</p>
                            
                            <h5>Comunhão:</h5>
                            <p>Músicas intimistas e emocionantes para o momento da comunhão.</p>
                            
                            <h5>Assinaturas e Fotos:</h5>
                            <p>Músicas instrumentais suaves para background durante as assinaturas.</p>
                            
                            <h5>Saída do Casal:</h5>
                            <p>Músicas alegres e festivas para celebrar a união!</p>
                        </div>
                        
                        <div class="form-check mt-4">
                            <input class="form-check-input" type="checkbox" id="concordoOrientacoes" ${userState.orientacoesLidas ? 'checked' : ''}>
                            <label class="form-check-label" for="concordoOrientacoes">
                                Li e compreendi as orientações
                            </label>
                        </div>
                        
                        <button class="btn btn-primary mt-3" id="btnProximoOrientacoes" ${!userState.orientacoesLidas ? 'disabled' : ''} onclick="proximoOrientacoes()">
                            Próximo <i class="bi bi-arrow-right ms-2"></i>
                        </button>
                    </div>
                </div>
            `;
        }

        // Gerar tela de repertório
        function gerarRepertorio() {
            if (!userState.instrucoesLidas) {
                return gerarInstrucoes();
            }
            
            if (!userState.orientacoesLidas) {
                return gerarOrientacoes();
            }
            
            let html = `
                <div class="card animate__animated animate__fadeIn">
                    <div class="card-header">
                        <h3 class="mb-0"><i class="bi bi-music-note-beamed me-2"></i>Selecione seu Repertório</h3>
                    </div>
                    <div class="card-body">
                        <div class="progress mb-4">
                            <div class="progress-bar" role="progressbar" style="width: 0%; background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));" id="progressoRepertorio">
                                0%
                            </div>
                        </div>
                        
                        <div id="repertorioSecoes">
                            <!-- As seções serão carregadas dinamicamente -->
                        </div>
                    </div>
                </div>
            `;
            
            // Carregar seções após renderizar
            setTimeout(() => carregarSecoesRepertorio(), 100);
            
            return html;
        }

        // Carregar seções do repertório
        function carregarSecoesRepertorio() {
            const secoes = [
                { id: 'entradaNoivo', titulo: 'Entrada do Noivo', musicas: musicas.entradaNoivo },
                { id: 'entradaDamas', titulo: 'Entrada das Damas', musicas: musicas.entradaDamas },
                { id: 'entradaNoiva', titulo: 'Entrada da Noiva', musicas: musicas.entradaNoiva },
                { id: 'salmo', titulo: 'Salmo', musicas: musicas.salmo },
                { id: 'aclamacao', titulo: 'Aclamação', musicas: musicas.aclamacao },
                { id: 'comunhao', titulo: 'Comunhão', musicas: musicas.comunhao },
                { id: 'assinatura', titulo: 'Assinatura e Fotos', musicas: musicas.assinatura },
                { id: 'saida', titulo: 'Saída do Casal', musicas: musicas.saida }
            ];
            
            let html = '';
            secoes.forEach((secao, index) => {
                html += gerarSecaoMusica(secao, index === 0);
            });
            
            $('#repertorioSecoes').html(html);
        }

        // Gerar seção de músicas
        function gerarSecaoMusica(secao, isFirst) {
            const selecionadas = userState.selecoes[secao.id] || [];
            
            return `
                <div class="secao-musica mb-5" id="secao-${secao.id}" style="${!isFirst ? 'display: none;' : ''}">
                    <h4 class="section-title">${secao.titulo}</h4>
                    <p class="text-muted">Selecione até 2 músicas (${selecionadas.length}/2 selecionadas)</p>
                    
                    <div class="row">
                        ${secao.musicas.map(musica => gerarCardMusica(musica, secao.id, selecionadas.includes(musica.id))).join('')}
                    </div>
                    
                    <div class="text-end mt-4">
                        <button class="btn btn-primary" onclick="proximaSecao('${secao.id}')" ${selecionadas.length !== 2 ? 'disabled' : ''}>
                            Próximo <i class="bi bi-arrow-right ms-2"></i>
                        </button>
                    </div>
                </div>
            `;
        }

        // Gerar card de música
        function gerarCardMusica(musica, categoria, selecionada) {
            const selecionadas = userState.selecoes[categoria] || [];
            const disabled = !selecionada && selecionadas.length >= 2;
            
            return `
                <div class="col-md-6">
                    <div class="music-card ${selecionada ? 'selected' : ''} ${disabled ? 'disabled' : ''}" 
                         onclick="selecionarMusica(${musica.id}, '${categoria}', this)">
                        <div class="d-flex align-items-center">
                            <button class="play-btn me-3" onclick="event.stopPropagation(); tocarMusica('${musica.url}')">
                                <i class="bi bi-play-fill"></i>
                            </button>
                            <div>
                                <h5 class="mb-1">${musica.nome}</h5>
                                <small class="text-muted">${musica.artista}</small>
                            </div>
                            ${selecionada ? '<i class="bi bi-check-circle-fill ms-auto" style="color: var(--primary-color);"></i>' : ''}
                        </div>
                    </div>
                </div>
            `;
        }

        // Selecionar música
        function selecionarMusica(id, categoria, elemento) {
            const selecionadas = userState.selecoes[categoria] || [];
            
            if (selecionadas.includes(id)) {
                // Remover seleção
                userState.selecoes[categoria] = selecionadas.filter(m => m !== id);
                $(elemento).removeClass('selected');
            } else {
                // Adicionar seleção (máx 2)
                if (selecionadas.length < 2) {
                    userState.selecoes[categoria].push(id);
                    $(elemento).addClass('selected');
                } else {
                    alert('Você já selecionou 2 músicas para esta categoria!');
                }
            }
            
            // Atualizar contador
            $(`#secao-${categoria} .text-muted`).text(`Selecione até 2 músicas (${userState.selecoes[categoria].length}/2 selecionadas)`);
            
            // Habilitar/desabilitar botão próximo
            if (userState.selecoes[categoria].length === 2) {
                $(`#secao-${categoria} .btn-primary`).prop('disabled', false);
            } else {
                $(`#secao-${categoria} .btn-primary`).prop('disabled', true);
            }
            
            // Atualizar progresso
            atualizarProgresso();
            
            // Salvar estado
            saveUserState();
        }

        // Próxima seção do repertório
        function proximaSecao(categoriaAtual) {
            const secoes = ['entradaNoivo', 'entradaDamas', 'entradaNoiva', 'salmo', 'aclamacao', 'comunhao', 'assinatura', 'saida'];
            const indexAtual = secoes.indexOf(categoriaAtual);
            
            if (indexAtual < secoes.length - 1) {
                const proximaSecao = secoes[indexAtual + 1];
                $(`#secao-${categoriaAtual}`).hide();
                $(`#secao-${proximaSecao}`).show();
                
                // Rolar para o topo
                $('html, body').animate({
                    scrollTop: $(`#secao-${proximaSecao}`).offset().top - 100
                }, 500);
            } else {
                // Todas as seções concluídas
                alert('Parabéns! Você concluiu a seleção do repertório!');
                showSection('repertorioFinal');
            }
        }

        // Tocar música
        function tocarMusica(url) {
            const audio = document.getElementById('audioPlayer');
            audio.src = url;
            audio.play();
        }

        // Atualizar progresso
        function atualizarProgresso() {
            const secoes = ['entradaNoivo', 'entradaDamas', 'entradaNoiva', 'salmo', 'aclamacao', 'comunhao', 'assinatura', 'saida'];
            const totalSelecionadas = secoes.reduce((total, secao) => {
                return total + (userState.selecoes[secao]?.length || 0);
            }, 0);
            
            const totalNecessario = secoes.length * 2;
            const progresso = (totalSelecionadas / totalNecessario) * 100;
            
            $('#progressoRepertorio').css('width', progresso + '%').text(Math.round(progresso) + '%');
        }

        // Próximo em instruções
        function proximoInstrucoes() {
            if ($('#concordoInstrucoes').is(':checked')) {
                userState.instrucoesLidas = true;
                saveUserState();
                showSection('repertorio');
            }
        }

        // Próximo em orientações
        function proximoOrientacoes() {
            if ($('#concordoOrientacoes').is(':checked')) {
                userState.orientacoesLidas = true;
                saveUserState();
                showSection('repertorio');
            }
        }

        // Gerar repertório final
        function gerarRepertorioFinal() {

                { id: 'entradaNoiva', titulo: 'Entrada da Noiva' },
                { id: 'salmo', titulo: 'Salmo' },

            let html = `
                <div class="card animate__animated animate__fadeIn">

            `;
            
            secoes.forEach(secao => {
                const idsSelecionados = userState.selecoes[secao.id] || [];
