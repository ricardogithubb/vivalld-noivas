<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vivalld - Redirecionando...</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="./vivalld-noivas/assets/css/styles.css">
</head>
<body>
    <div class="container text-center mt-5">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Carregando...</span>
        </div>
        <p class="mt-3">Redirecionando...</p>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./vivalld-noivas/assets/js/db.js"></script>
    <script src="./vivalld-noivas/assets/js/auth.js"></script>
    <script src="./vivalld-noivas/assets/js/utils.js"></script>
    <script>
        $(document).ready(async () => {
            await DB.init();
            await Auth.init();
            
            if (Auth.currentUser) {
                const nextScreen = await Auth.getNextScreen();
                window.location.href = `${nextScreen}.html`;
            } else {
                window.location.href = 'login.html';
            }
        });
    </script>
</body>
</html>
