<!DOCTYPE html>
<html lang="pt-br" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vivalld - Planejamento Musical para Casamentos</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container" id="app">
        <!-- Tela de Login -->
        <div id="loginScreen" class="login-container">
            <div class="card login-card animate__animated animate__fadeIn">
                <div class="text-center mb-4">
                    <i class="bi bi-music-note-beamed" style="font-size: 3rem; color: var(--primary-color);"></i>
                    <h2 class="mt-3">Vivalld</h2>
                    <p class="text-muted">Planejamento Musical para Casamentos</p>
                </div>
                <form id="loginForm">
                    <div class="mb-3">
                        <label for="email" class="form-label">E-mail</label>
                        <input type="email" class="form-control" id="email" required value="teste@gmail.com">
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Senha</label>
                        <input type="password" class="form-control" id="password" required value="123">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Entrar</button>
                </form>
                <div class="text-center mt-3">
                    <small class="text-muted">Use: teste@gmail.com / 123</small>
                </div>
            </div>
        </div>

        <!-- Tela Principal (após login) -->
        <div id="mainScreen" style="display: none;">
            <!-- Navbar Fixa -->
            <nav class="navbar navbar-expand-lg navbar-light fixed-top">
                <div class="container-fluid">
                    <a class="navbar-brand d-flex flex-column" href="#">
                        <span>
                            <i class="bi bi-music-note-beamed" style="color: var(--primary-color);"></i>
                            Vivalld
                        </span>
                        <small class="text-muted" style="font-size: 0.95rem;">
                            Olá Ricardo
                        </small>
                    </a>
                    
                    <div class="d-flex align-items-center order-lg-2">
                        <!-- Botão Tema -->
                        <button class="btn btn-icon me-2" id="themeToggle" onclick="Theme.toggle()">
                            <i class="bi bi-sun-fill" id="themeIcon"></i>
                        </button>
                        
                        <!-- Botão Favoritar -->
                        <button class="btn btn-icon me-2" id="favoriteToggle" onclick="Theme.toggleFavorite()">
                            <i class="bi bi-star" id="favoriteIcon"></i>
                        </button>
                        
                        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                            <span class="navbar-toggler-icon"></span>
                        </button>
                    </div>
                    
                    <div class="collapse navbar-collapse" id="navbarNav">
                        <ul class="navbar-nav ms-auto">
                            <li class="nav-item">
                                <a class="nav-link" href="#" onclick="showSection('instrucoes')">Instruções</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="#" onclick="showSection('repertorio')">Repertório</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="#" onclick="showSection('contrato')">Contrato</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="#" onclick="showSection('boletos')">Boletos</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="#" onclick="showSection('repertorioFinal')">Meu Repertório</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link text-danger" href="#" onclick="logout()">Sair</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>

            <!-- Espaço para navbar fixa -->
            <div style="height: 70px;"></div>

            <!-- Conteúdo Principal -->
            <div id="contentArea" class="content-wrapper">
                <!-- As seções serão carregadas aqui dinamicamente -->
            </div>
        </div>
    </div>

    <!-- Audio Player (oculto) -->
    <audio id="audioPlayer" style="display: none;"></audio>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- Custom JS -->
    <script src="js/database.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/musicas.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
