<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bridal Harmony - Seu Repertório de Casamento</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body>
    <!-- Toast Container -->
    <div class="toast-container position-fixed top-0 end-0 p-3"></div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay d-none">
        <div class="spinner-border text-light" role="status">
            <span class="visually-hidden">Carregando...</span>
        </div>
    </div>

    <!-- Main App Container -->
    <div id="app" class="container-fluid p-0">
        <!-- Header -->
        <header class="header fixed-top">
            <div class="container-fluid">
                <div class="row align-items-center">
                    <div class="col-2">
                        <button id="backButton" class="btn btn-link nav-btn d-none">
                            <i class="bi bi-arrow-left"></i>
                        </button>
                    </div>
                    <div class="col-8 text-center">
                        <h1 id="pageTitle" class="page-title">Bridal Harmony</h1>
                    </div>
                    <div class="col-2 text-end">
                        <button id="menuButton" class="btn btn-link nav-btn">
                            <i class="bi bi-three-dots-vertical"></i>
                        </button>
                    </div>
                </div>
            </div>
            <!-- Progress Bar (visible only in repertory) -->
            <div id="progressContainer" class="progress-container d-none">
                <div class="progress">
                    <div id="wizardProgress" class="progress-bar" role="progressbar" style="width: 0%"></div>
                </div>
                <span id="progressText" class="progress-text"></span>
            </div>
        </header>

        <!-- Main Content -->
        <main id="mainContent" class="main-content">
            <!-- Dynamic content will be loaded here -->
        </main>

        <!-- Footer with Next Button -->
        <footer id="footer" class="footer fixed-bottom d-none">
            <div class="container-fluid">
                <button id="nextButton" class="btn btn-primary next-btn w-100" disabled>
                    Próximo
                </button>
            </div>
        </footer>
    </div>

    <!-- Menu Offcanvas -->
    <div class="offcanvas offcanvas-end" tabindex="-1" id="menuOffcanvas">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title">Menu</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body">
            <div class="list-group">
                <button class="list-group-item list-group-item-action menu-item" data-action="repertorio">
                    <i class="bi bi-music-note-beamed me-3"></i> Repertório
                </button>
                <button class="list-group-item list-group-item-action menu-item" data-action="contrato">
                    <i class="bi bi-file-text me-3"></i> Contrato
                </button>
                <button class="list-group-item list-group-item-action menu-item" data-action="boletos">
                    <i class="bi bi-receipt me-3"></i> Boletos
                </button>
                <button class="list-group-item list-group-item-action menu-item" data-action="resumo">
                    <i class="bi bi-check2-circle me-3"></i> Repertório Escolhido
                </button>
                <hr>
                <button class="list-group-item list-group-item-action menu-item" data-action="termos">
                    <i class="bi bi-file-earmark-text me-3"></i> Rever Termos
                </button>
                <button class="list-group-item list-group-item-action menu-item text-danger" data-action="logout">
                    <i class="bi bi-box-arrow-right me-3"></i> Sair
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/db.js"></script>
    <script src="/assets/js/auth.js"></script>
    <script src="/assets/js/repertorio.js"></script>
    <script src="/assets/js/boletos.js"></script>
    <script src="/assets/js/app.js"></script>
</body>
</html>
