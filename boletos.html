<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vivalld - Boletos</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body>
    <!-- Toast Container -->
    <div class="toast-container position-fixed top-0 end-0 p-3"></div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay d-none">
        <div class="spinner-border text-light" role="status">
            <span class="visually-hidden">Carregando...</span>
        </div>
    </div>

    <!-- Header -->
    <header class="header fixed-top">
        <div class="container-fluid">
            <div class="row align-items-center">
                <div class="col-2">
                    <button id="backButton" class="btn btn-link nav-btn">
                        <i class="bi bi-arrow-left"></i>
                    </button>
                </div>
                <div class="col-8 text-center d-flex justify-content-center align-items-center">
                    <i class="bi bi-music-note-beamed me-2"
                    style="font-size: 1.5rem; color: var(--primary-color);"></i>
                    <h2 class="m-0">Vivalld</h2>
                </div>
                <div class="col-2 text-end">
                    <button id="menuButton" class="btn btn-link nav-btn">
                        <i class="bi bi-three-dots-vertical"></i>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main id="mainContent" class="main-content">
        <!-- Conteúdo será carregado dinamicamente -->
    </main>

    <!-- Menu Offcanvas -->
    <div class="offcanvas offcanvas-end" tabindex="-1" id="menuOffcanvas">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title">Menu</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body">
            <div class="list-group">
                <button class="list-group-item list-group-item-action menu-item" data-action="repertorio">
                    <i class="bi bi-music-note-beamed me-3"></i> Repertório
                </button>
                <button class="list-group-item list-group-item-action menu-item" data-action="contrato">
                    <i class="bi bi-file-text me-3"></i> Contrato
                </button>
                <button class="list-group-item list-group-item-action menu-item active" data-action="boletos">
                    <i class="bi bi-receipt me-3"></i> Boletos
                </button>
                <button class="list-group-item list-group-item-action menu-item" data-action="resumo">
                    <i class="bi bi-check2-circle me-3"></i> Repertório Escolhido
                </button>
                <hr>
                <button class="list-group-item list-group-item-action menu-item text-danger" data-action="logout">
                    <i class="bi bi-box-arrow-right me-3"></i> Sair
                </button>
            </div>
        </div>
    </div>

    <!-- Modal de Detalhes do Boleto -->
    <div class="modal fade" id="boletoModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Detalhes do Boleto</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="boletoModalBody">
                    <!-- Conteúdo dinâmico -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                    <button type="button" class="btn btn-primary" id="copyBoletoBtn">
                        <i class="bi bi-clipboard me-2"></i>Copiar Código
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/vivalld-noivas/assets/js/db.js"></script>
    <script src="/vivalld-noivas/assets/js/auth.js"></script>
    <script src="/vivalld-noivas/assets/js/utils.js"></script>
    <script>
        let menuOffcanvas;
        let boletoModal;
        let currentFilter = 'todos';
        let allBills = [];

        $(document).ready(async () => {
            try {
                $('#loadingOverlay').removeClass('d-none');
                
                await DB.init();
                await Auth.init();
                
                // Verificar autenticação
                if (!Auth.currentUser) {
                    window.location.href = 'login.html';
                    return;
                }

                // Verificar termos
                const terms = await Auth.checkFirstTimeUser();
                if (!terms.termo1Aceito || !terms.termo2Aceito) {
                    window.location.href = 'termo1.html';
                    return;
                }

                // Inicializar componentes
                menuOffcanvas = new bootstrap.Offcanvas(document.getElementById('menuOffcanvas'));
                boletoModal = new bootstrap.Modal(document.getElementById('boletoModal'));

                // Carregar boletos
                await loadBills();

                // Setup event listeners
                setupEventListeners();

            } catch (error) {
                console.error('Error initializing page:', error);
                Utils.showToast('Erro ao carregar página', 'danger');
            } finally {
                $('#loadingOverlay').addClass('d-none');
            }
        });

        function setupEventListeners() {
            // Menu button
            $('#menuButton').on('click', () => menuOffcanvas.show());

            // Menu items
            $('.menu-item').on('click', async (e) => {
                const action = $(e.currentTarget).data('action');
                menuOffcanvas.hide();
                
                if (action === 'logout') {
                    await handleLogout();
                } else {
                    window.location.href = `${action}.html`;
                }
            });

            // Back button
            $('#backButton').on('click', () => {
                window.history.back();
            });

            // Copy boleto button
            $('#copyBoletoBtn').on('click', () => {
                const barcode = $('#boletoModalBody .boleto-barcode').text();
                navigator.clipboard.writeText(barcode).then(() => {
                    Utils.showToast('Código copiado para a área de transferência');
                    boletoModal.hide();
                }).catch(() => {
                    Utils.showToast('Erro ao copiar código', 'danger');
                });
            });
        }

        async function loadBills() {
            try {
                // Carregar boletos do banco
                allBills = await DB.getAll('bills');
                
                // Atualizar status de vencidos
                allBills = allBills.map(bill => {
                    if (bill.status === 'pendente' && new Date(bill.dueDate) < new Date()) {
                        bill.status = 'vencido';
                    }
                    return bill;
                });

                renderBills();

            } catch (error) {
                console.error('Error loading bills:', error);
                Utils.showToast('Erro ao carregar boletos', 'danger');
            }
        }

        function renderBills() {
            // Filtrar boletos
            const filteredBills = filterBills();

            // Calcular totais
            const totals = calculateTotals();

            let html = `
                <div class="section-card fade-in">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h2 class="section-title mb-0">Boletos</h2>
                        <div class="text-end">
                            <small class="text-muted">Total: ${formatCurrency(calculateTotalAmount())}</small>
                        </div>
                    </div>

                    <!-- Cards de Resumo -->


                    <!-- Filtros -->
                    <div class="filter-buttons mb-4">
                        <button class="filter-btn ${currentFilter === 'todos' ? 'active' : ''}" 
                                onclick="setFilter('todos')">Todos</button>
                        <button class="filter-btn ${currentFilter === 'pendente' ? 'active' : ''}" 
                                onclick="setFilter('pendente')">Pendentes</button>
                        <button class="filter-btn ${currentFilter === 'pago' ? 'active' : ''}" 
                                onclick="setFilter('pago')">Pagos</button>
                        <button class="filter-btn ${currentFilter === 'vencido' ? 'active' : ''}" 
                                onclick="setFilter('vencido')">Vencidos</button>
                    </div>

                    <!-- Lista de Boletos -->
                    <div class="bills-list">
            `;

            if (filteredBills.length === 0) {
                html += `
                    <div class="text-center py-5">
                        <i class="bi bi-receipt" style="font-size: 4rem; color: var(--border-color);"></i>
                        <h3 class="h5 mt-3" style="color: var(--text-light);">Nenhum boleto encontrado</h3>
                        <p class="text-muted small">Não há boletos ${currentFilter !== 'todos' ? 'com este status' : ''}</p>
                    </div>
                `;
            } else {
                filteredBills.forEach(bill => {
                    const dueDate = new Date(bill.dueDate).toLocaleDateString('pt-BR');
                    const isOverdue = bill.status === 'vencido';
                    
                    html += `
                        <div class="boleto-card ${isOverdue ? 'overdue' : ''}">
                            <div class="boleto-card-header">
                                <div class="boleto-card-title">${bill.description}</div>
                                <span class="boleto-status status-${bill.status}">
                                    ${getStatusText(bill.status)}
                                </span>
                            </div>
                            
                            <div class="boleto-card-body">
                                <div class="boleto-info">
                                    <i class="bi bi-calendar3"></i>
                                    <span>Vencimento: <strong>${dueDate}</strong></span>
                                </div>
                                <div class="boleto-info">
                                    <i class="bi bi-cash"></i>
                                    <span>Valor: <strong>${bill.amount}</strong></span>
                                </div>
                                ${bill.status === 'pago' ? `
                                    <div class="boleto-info text-success">
                                        <i class="bi bi-check-circle-fill"></i>
                                        <span>Pago em: <strong>${new Date().toLocaleDateString('pt-BR')}</strong></span>
                                    </div>
                                ` : ''}
                            </div>
                            
                            <div class="boleto-card-footer">
                                <button class="btn btn-sm btn-outline-primary" onclick="viewBoleto('${bill.id}')">
                                    <i class="bi bi-eye"></i> Ver Boleto
                                </button>
                                ${bill.status !== 'pago' ? `
                                    <button class="btn btn-sm btn-primary" onclick="payBoleto('${bill.id}')">
                                        <i class="bi bi-credit-card"></i> Pagar Agora
                                    </button>
                                ` : ''}
                            </div>
                        </div>
                    `;
                });
            }

            html += '</div></div>';
            
            $('#mainContent').html(html);
        }

        function filterBills() {
            if (currentFilter === 'todos') {
                return allBills;
            }
            return allBills.filter(bill => bill.status === currentFilter);
        }

        function calculateTotals() {
            return {
                total: allBills.length,
                pendente: allBills.filter(b => b.status === 'pendente').length,
                pago: allBills.filter(b => b.status === 'pago').length,
                vencido: allBills.filter(b => b.status === 'vencido').length
            };
        }

        function calculateTotalAmount() {
            return allBills.reduce((total, bill) => {
                const value = parseFloat(bill.amount.replace('R$ ', '').replace('.', '').replace(',', '.'));
                return total + (bill.status !== 'pago' ? value : 0);
            }, 0);
        }

        function formatCurrency(value) {
            return value.toLocaleString('pt-BR', {
                style: 'currency',
                currency: 'BRL',
                minimumFractionDigits: 2
            });
        }

        function getStatusText(status) {
            const statusMap = {
                'pago': 'Pago',
                'pendente': 'Pendente',
                'vencido': 'Vencido'
            };
            return statusMap[status] || status;
        }

        window.setFilter = function(filter) {
            currentFilter = filter;
            renderBills();
        };

        window.viewBoleto = async function(billId) {
            const bill = allBills.find(b => b.id === billId);
            if (!bill) return;

            const dueDate = new Date(bill.dueDate).toLocaleDateString('pt-BR');
            
            const modalBody = `
                <div class="text-center mb-4">
                    <i class="bi bi-receipt" style="font-size: 3rem; color: var(--primary-color);"></i>
                    <h5 class="mt-2">${bill.description}</h5>
                </div>
                
                <div class="boleto-details">
                    <div class="detail-row">
                        <span class="detail-label">Status:</span>
                        <span class="detail-value">
                            <span class="boleto-status status-${bill.status}">
                                ${getStatusText(bill.status)}
                            </span>
                        </span>
                    </div>
                    
                    <div class="detail-row">
                        <span class="detail-label">Valor:</span>
                        <span class="detail-value"><strong>${bill.amount}</strong></span>
                    </div>
                    
                    <div class="detail-row">
                        <span class="detail-label">Vencimento:</span>
                        <span class="detail-value">${dueDate}</span>
                    </div>
                    
                    <div class="detail-row">
                        <span class="detail-label">Código de Barras:</span>
                        <span class="detail-value boleto-barcode">${bill.barCode}</span>
                    </div>
                    
                    <hr>
                    
                    <div class="text-center">
                        <img src="https://via.placeholder.com/300x100/e5d9d0/8b7355?text=Linha+Digitável" 
                             alt="Boleto" class="img-fluid" style="border-radius: 8px;">
                        <p class="text-muted small mt-2">Representação visual do boleto</p>
                    </div>
                </div>
            `;

            $('#boletoModalBody').html(modalBody);
            boletoModal.show();
        };

        window.payBoleto = function(billId) {
            Utils.showToast('Redirecionando para pagamento...');
            // Simular pagamento
            setTimeout(() => {
                Utils.showToast('Pagamento simulado com sucesso');
            }, 2000);
        };

        async function handleLogout() {
            await Auth.logout();
            window.location.href = 'login.html';
        }
    </script>

    <style>
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
        }

        .summary-card {
            background: linear-gradient(135deg, #ffffff, #fef9f4);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .summary-card:hover {
            transform: translateY(-2px);
            border-color: var(--primary-color);
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.1);
        }

        .summary-card.active {
            border: 2px solid var(--primary-color);
            background: linear-gradient(135deg, #fef9f4, #f8f0e6);
        }

        .summary-card-title {
            font-size: 0.85rem;
            color: var(--text-light);
            margin-bottom: 0.5rem;
        }

        .summary-card-value {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-dark);
        }

        .boleto-card {
            background: linear-gradient(135deg, #ffffff, #fef9f4);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.25rem;
            margin-bottom: 1rem;
            transition: all 0.3s ease;
        }

        .boleto-card:hover {
            border-color: var(--primary-color);
            transform: translateX(4px);
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.1);
